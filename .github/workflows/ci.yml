---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 4 1 * *'
  # Run workflow manually
  workflow_dispatch:

jobs:
  rubocop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update APT
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libgdk-pixbuf2.0-dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Bundler
        run: bundle install

      - name: Rubocop
        run: bin/rubocop

  rspec:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.4'
          - '3.3'
          - '3.2'
          #- 'head'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update APT
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libgdk-pixbuf2.0-dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          # We cannot use bundler cache here:
          # Failure/Error: require 'gtk3'
          # GObjectIntrospection::RepositoryError::TypelibNotFound:
          #   Typelib file for namespace 'Atk' (any version) not found
          # bundler-cache: true

      - name: Bundle install
        run: bundle install

      - name: Fake screen
        run: Xvfb :99 &

      - name: Run RSpec
        run: bin/rspec
        env:
          DISPLAY: ':99'

      - name: Publish code coverage
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/coverage.json
